<html lang="ja">

<title>NOW CLOCK — Desk Clock</title>
<style>@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{background:radial-gradient(ellipse at 50% 30%,#6b3a18 0%,#3a1a06 55%,#1a0a02 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.3;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E")}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(10,4,1,.55);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,160,64,.15)}
.logo{font-family:'IM Fell English',serif;font-size:.9rem;color:#e8c870;letter-spacing:.2em;font-style:italic}
.ctrls{display:flex;gap:5px;align-items:center}
.btn{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:.1em;padding:3px 9px;border:1px solid rgba(200,160,64,.2);background:transparent;color:rgba(240,224,180,.55);cursor:pointer;border-radius:2px;transition:all .2s}
.btn:hover,.btn.on{border-color:#c8a040;color:#c8a040}
.btn.lon{border-color:#e8c870;color:#e8c870}
.sep{width:1px;height:14px;background:rgba(200,160,64,.15)}
.time-wrap{text-align:center;margin-bottom:14px}
#dtime{font-family:'IM Fell English',serif;font-size:clamp(1.4rem,4.5vw,2rem);color:#e8c870;letter-spacing:.2em}
#ddate{font-family:'Cormorant Garamond',serif;font-size:clamp(.7rem,2.2vw,.88rem);color:rgba(240,224,180,.5);letter-spacing:.12em;margin-top:2px}
.clock-wrap{display:flex;flex-direction:column;align-items:center}
.feet-row{display:flex;width:min(380px,80vw);justify-content:space-around;padding:0 18%;margin-top:-6px}
.foot{width:min(42px,9.5vw);height:min(21px,5vw);background:radial-gradient(ellipse at 38% 32%,#90d0f0,#3a80b8 55%,#1a4878);border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,.5)}
.copy{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:.58rem;color:rgba(200,160,64,.35);letter-spacing:.15em;white-space:nowrap;z-index:100}
@keyframes pendSwing{0%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}100%{transform:rotate(-12deg)}}</style>
</head>

const DJA=["日","月","火","水","木","金","土"];
const DEN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MEN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function update(){
  const n=new Date();
  const h=n.getHours(),m=n.getMinutes(),s=n.getSeconds(),ms=n.getMilliseconds();
  const p=v=>String(v).padStart(2,"0");
  document.getElementById("dtime").textContent=p(h)+":"+p(m)+":"+p(s);
  document.getElementById("ddate").textContent=lang==="ja"
    ?n.getFullYear()+"年"+(n.getMonth()+1)+"月"+n.getDate()+"日　"+DJA[n.getDay()]+"曜日"
    :DEN[n.getDay()]+", "+MEN[n.getMonth()]+" "+n.getDate()+", "+n.getFullYear();
  const oa=-((h+(m+(s+ms/1000)/60)/60)/24*360);
  const ia=-((m+(s+ms/1000)/60)/60*360);
  document.getElementById("od").setAttribute("transform","rotate("+oa+",250,250)");
  document.getElementById("id").setAttribute("transform","rotate("+ia+",250,250)");
  requestAnimationFrame(update);}
